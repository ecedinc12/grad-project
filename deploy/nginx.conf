# DigitalOcean Droplet — nginx konfigürasyonu
# Statik React build'ini serve eder (grad-project-front/app/dist)
# Backend API RunPod'da ayrıca çalışır; bu config yalnızca frontend'i serve eder.
# Kurulum: cp deploy/nginx.conf /etc/nginx/sites-available/sdg-ui
#           ln -sf /etc/nginx/sites-available/sdg-ui /etc/nginx/sites-enabled/sdg-ui
#           nginx -t && systemctl reload nginx

server {
    server_name visionforge.tech www.visionforge.tech;

    root /var/www/visionforge/app/dist;
    index index.html;

    # SPA fallback: bilinmeyen path'leri index.html'e yönlendir (React Router)
    location / {
        try_files $uri $uri/ /index.html;
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/visionforge.tech/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/visionforge.tech/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

server {
    if ($host = www.visionforge.tech) { return 301 https://$host$request_uri; }
    if ($host = visionforge.tech)     { return 301 https://$host$request_uri; }
    listen 80;
    server_name visionforge.tech www.visionforge.tech;
    return 404;
}
