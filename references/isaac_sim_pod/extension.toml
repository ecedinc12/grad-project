[package]
version = "0.7.9"
authors = ["NVIDIA"]
title = "Animated People Controller"
description= "Animated People Controller"
readme  = "docs/README.md"
category = "Animation"
keywords = ["people","metropolis","simulation", "animation", "metrosim"]
changelog="docs/CHANGELOG.md"
preview_image = "data/preview.png"
icon = "data/icon.png"
writeTarget.kit = true

[dependencies]
"omni.usd" = {}
"omni.ui" = {}
"omni.kit.menu.utils" = {}
"omni.anim.navigation.core" = { version = "~107.3.0" }

"omni.anim.graph.core" = {}
"omni.anim.retarget.core" = {}
"omni.kit.scripting" = {}
"isaacsim.storage.native" = {}
"omni.metropolis.utils" = { version = "^0.1.19"}

[[python.module]]
name = "omni.anim.people"

[settings]
exts."omni.anim.people".command_settings.command_file_path = ""
exts."omni.anim.people".command_settings.robot_command_file_path = ""
exts."omni.anim.people".command_settings.number_of_loop = 0
exts."omni.anim.people".navigation_settings.dynamic_avoidance_enabled= true
exts."omni.anim.people".navigation_settings.navmesh_enabled = true
exts."omni.anim.people".cache_action_metadata = false
exts."omni.anim.people".final_target_distance = 0.25
persistent.exts."omni.anim.people".asset_settings.character_assets_path = ""
persistent.exts."omni.anim.people".behavior_script_settings.behavior_script_path = ""
persistent.exts."omni.anim.people".character_prim_path = "/World/Characters"
persistent.exts."omni.anim.people".custom_command_tracking_file_path = ""

[[test]]
dependencies = []
args = [
    "--no-window",
    "--/windowless=1",
    "--/app/settings/fabricDefaultStageFrameHistoryCount=3",
    "--/app/file/ignoreUnsavedStage=1",
]
stdoutFailPatterns.exclude = [
    "*GLInteropContext::init: carb::windowing is not available*"
]

[[test]]
name = "startup"
args = [
    "--/app/settings/fabricDefaultStageFrameHistoryCount=3",
]
stdoutFailPatterns.exclude = [
    "*GLInteropContext::init: carb::windowing is not available*"
]
